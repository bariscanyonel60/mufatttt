name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          ADMIN_USER: ci-admin
          ADMIN_PASSWORD: ci-build-password-not-for-prod
          ADMIN_SECRET: ci-build-secret-at-least-32-characters-long
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: osgt7obm
